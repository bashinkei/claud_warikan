<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>割り勘アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>割り勘アプリ</h1>

    <!-- トースト通知 -->
    <div class="toast" id="toast"></div>

    <!-- FAB: 保存・読み込み -->
    <div class="fab-container" id="fab-container">
      <div class="fab-menu" id="fab-menu">
        <label class="fab-menu-item">
          <span>読み込み(json)</span>
          <input type="file" id="load-file" accept=".json" multiple style="display:none" onchange="loadData(event)">
        </label>
        <button class="fab-menu-item" onclick="saveData()">保存(json)</button>
      </div>
      <button class="fab-btn" id="fab-btn" onclick="toggleFab()" title="保存・読み込み">
        <span class="fab-icon">💾</span>
        <span class="fab-label">保存メニュー</span>
      </button>
    </div>

    <!-- メンバー登録 -->
    <div class="card">
      <h2>メンバー登録</h2>
      <div class="member-input-row">
        <input type="text" id="member-name" placeholder="名前を入力" style="flex:1">
        <button class="btn btn-primary" onclick="addMember()">追加</button>
      </div>
      <div class="error-msg" id="member-error">名前を入力してください</div>
      <div class="member-chips" id="member-chips">
        <span class="empty-state" id="member-empty">まだメンバーがいません</span>
      </div>
    </div>

    <!-- 立替入力 -->
    <div class="card" id="payment-form-card">
      <h2>立替を追加</h2>
      <div class="form-row">
        <div class="form-col" style="flex:1">
          <label>支払った人</label>
          <select id="payer">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-col" style="flex:1">
          <label>金額（円）</label>
          <input type="number" id="amount" placeholder="例: 3000" min="1">
        </div>
      </div>
      <div class="for-whom">
        <label>誰の分？（複数選択可）</label>
        <div class="checkboxes" id="beneficiaries">
          <span class="empty-state">先にメンバーを登録してください</span>
        </div>
      </div>
      <div class="memo-row">
        <label>メモ（任意）</label>
        <input type="text" id="memo" placeholder="例: 居酒屋代">
      </div>
      <div class="error-msg" id="payment-error"></div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary btn-block" id="payment-submit-btn" onclick="addPayment()">追加する</button>
        <button class="btn btn-secondary btn-block" id="payment-cancel-btn" onclick="cancelEdit()" style="display:none">キャンセル</button>
      </div>
    </div>

    <!-- 立替一覧 -->
    <div class="card">
      <div style="margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #e2e8f0;">
        <h2 style="margin:0 0 10px;padding:0;border:none;">立替一覧</h2>
        <div class="sort-row">
          <div class="sort-col">
            <label class="sort-label">第1</label>
            <select class="sort-select" id="sort1" onchange="renderPayments()">
              <option value="default">追加順</option>
              <option value="amount-desc">金額が高い順</option>
              <option value="amount-asc">金額が低い順</option>
              <option value="payer" selected>支払った人順</option>
            </select>
          </div>
          <div class="sort-col">
            <label class="sort-label">第2</label>
            <select class="sort-select" id="sort2" onchange="renderPayments()">
              <option value="none">なし</option>
              <option value="default">追加順</option>
              <option value="amount-desc">金額が高い順</option>
              <option value="amount-asc" selected>金額が低い順</option>
              <option value="payer">支払った人順</option>
            </select>
          </div>
          <div class="sort-col">
            <label class="sort-label">第3</label>
            <select class="sort-select" id="sort3" onchange="renderPayments()">
              <option value="none">なし</option>
              <option value="default">追加順</option>
              <option value="amount-desc">金額が高い順</option>
              <option value="amount-asc">金額が低い順</option>
              <option value="payer">支払った人順</option>
            </select>
          </div>
        </div>
      </div>
      <div class="payment-list" id="payment-list">
        <span class="empty-state">まだ立替がありません</span>
      </div>
    </div>

    <!-- 精算計算 -->
    <div class="card">
      <h2>精算結果</h2>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary btn-block" onclick="calculate()">精算を計算する</button>
        <button class="btn btn-secondary btn-block" onclick="exportDocument()">ドキュメントとして保存</button>
      </div>
      <div class="memo-row" style="margin-top:12px;margin-bottom:0;">
        <label>ドキュメントタイトル</label>
        <input type="text" id="doc-title" placeholder="割り勘精算書">
      </div>
      <div id="result-area" style="margin-top:20px;"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
